<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨境 · 互动叙事引擎</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1>墨境 Storycraft</h1>
                    <p>AI 驱动的动态互动小说引擎</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <a href="profile.html" style="background: rgba(102,126,234,0.2); border: 1px solid #667eea; padding: 8px 20px; border-radius: 40px; color: #fff; text-decoration: none; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px;">
                        👤 个人主页
                    </a>
                    <a href="login.html" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 8px 20px; border-radius: 40px; color: #fff; text-decoration: none; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px;">
                        🔑 登录/注册
                    </a>
                </div>
            </div>
        </header>

        <!-- 开局界面 -->
        <div id="setup-screen" class="screen active">
            <div class="card">
                <h2>开始你的故事</h2>
                
                <div class="form-group">
                    <label>选择世界观：</label>
                    <select id="world-select">
                        <option value="noir">黑色电影 - 1952年，永远下雨的罪恶都市</option>
                        <option value="cyberpunk">赛博朋克 - 2077年，霓虹灯下的浮华与沉沦</option>
                        <option value="fantasy">奇幻 - 剑与魔法的中世纪世界</option>
                        <option value="xianxia">东方玄幻 - 九天玄界，灵气复苏，修仙问道</option>
                        <option value="strategy">古风权谋 - 天盛王朝，朝堂博弈，人心难测</option>
                        <option value="urban">都市传说 - 雾都怪谈，午夜禁忌，规则求生</option>
                        <option value="cthulhu">克苏鲁神话 - 1920年代，不可名状的古老恐惧</option>
                        <option value="wasteland">废土生存 - 2087年，核战后的末世废土</option>
                    </select>
                </div>

                <div class="form-group">
                         <label>选择角色模板（可选）：</label>
                         <select id="template-select">
                               <option value="">自定义开场</option>
                         </select>
                 </div>

                 <div class="form-group">
                    <label>或者选择你喜欢的标签（AI会推荐匹配的模板）：</label>
                    <div id="tags-container" class="tags-container">
                        <span class="tag-loading">加载标签中...</span>
                    </div>
                    <button id="ai-generate-btn" class="btn-secondary" style="margin-top: 10px; width: auto; padding: 8px 16px;">✨ AI 生成新模板</button>
                </div>
                
                <div id="recommendations-container" class="recommendations-container" style="display: none;">
                    <label>推荐模板：</label>
                    <div id="recommendations-list" class="recommendations-list"></div>
                </div>

                <div class="form-group">
                    <label>描述你的开场：</label>
                    <textarea id="opening-input" rows="3" placeholder="例如：我是一个刚从警校毕业的年轻侦探..."></textarea>
                </div>

                <button id="start-btn" class="btn-primary">开始冒险</button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <div class="game-container">
                <div class="story-card">
                    <div id="story-content" class="story-content">
                        <p class="placeholder">等待故事开始...</p>
                    </div>
                    
                    <div id="choices-container" class="choices"></div>

                    <!-- 自定义输入区域 -->
                    <div class="custom-input-area">
                        <label style="display: block; margin-bottom: 8px; color: #ccc;">或者输入你的自定义行动：</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="custom-choice-input" placeholder="例如：我想去码头问问那个船夫..." style="flex: 1; padding: 10px; background: rgba(20,20,40,0.8); border: 1px solid #444; border-radius: 10px; color: #fff;">
                            <button id="submit-custom-choice" class="btn-secondary" style="width: auto; padding: 10px 20px;">行动</button>
                        </div>
                    </div>

                    <div class="game-controls">
                        <button id="new-game-btn" class="btn-secondary">新游戏</button>
                        <span id="turn-indicator" class="turn-indicator">第 1 轮</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-spinner"></div>
            <p>AI 正在编织故事...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
