<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 墨境</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e8e8e8;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: 20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(102,126,234,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(118,75,162,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 24px;
            position: relative;
            z-index: 1;
        }

        /* 顶部导航 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 16px 24px;
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: #aaa;
            text-decoration: none;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .nav-links a:hover {
            color: #667eea;
            background: rgba(102,126,234,0.1);
        }

        /* 用户信息卡片 */
        .profile-card {
            background: rgba(30, 30, 50, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 32px;
            margin-bottom: 32px;
            transition: transform 0.3s;
        }
        .profile-header {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }
        .avatar-section {
            position: relative;
        }
        .avatar-wrapper {
            position: relative;
            cursor: pointer;
        }
        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
            box-shadow: 0 0 30px rgba(102,126,234,0.3);
            transition: all 0.3s;
        }
        .avatar-edit-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #667eea;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #1a1a2e;
        }
        .avatar-edit-overlay:hover {
            transform: scale(1.1);
            background: #764ba2;
        }
        .info-section {
            flex: 1;
        }
        .name-area {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .user-name {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #b0b0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .edit-name-btn {
            background: rgba(102,126,234,0.2);
            border: 1px solid #667eea;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #ccc;
        }
        .edit-name-btn:hover {
            background: #667eea;
            color: white;
        }
        .edit-name-input {
            background: rgba(20,20,40,0.9);
            border: 1px solid #667eea;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-size: 18px;
            width: 200px;
        }
        .user-badge {
            display: inline-block;
            background: rgba(102,126,234,0.2);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 12px;
            color: #667eea;
        }
        .stats-grid {
            display: flex;
            gap: 48px;
            margin: 24px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-label {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        /* 标签云 */
        .tags-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tags-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag-item {
            background: rgba(102,126,234,0.15);
            border: 1px solid rgba(102,126,234,0.3);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            transition: all 0.3s;
        }
        .tag-item:hover {
            background: rgba(102,126,234,0.3);
            transform: translateY(-2px);
        }

        /* 故事列表 */
        .stories-section {
            margin-top: 32px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .story-card {
            background: rgba(30, 30, 50, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .story-card:hover {
            transform: translateY(-4px);
            background: rgba(30, 30, 50, 0.8);
            border-color: rgba(102,126,234,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .story-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .story-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(102,126,234,0.2);
            color: #667eea;
        }
        .story-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }
        .story-summary {
            font-size: 13px;
            color: #bbb;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(30,30,50,0.3);
            border-radius: 24px;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .stats-grid {
                justify-content: center;
            }
            .name-area {
                justify-content: center;
            }
            .story-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    
    <div class="container">
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="logo-area" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <div class="logo-icon">📖</div>
                <span class="logo-text">墨境 Storycraft</span>
            </div>
            <div class="nav-links">
                <a href="index.html">游戏</a>
                <a href="history.html">历史</a>
                <a href="#" style="color: #667eea;">我的主页</a>
                <button id="logout-nav-btn" style="background: rgba(102,126,234,0.2); border: 1px solid #667eea; padding: 6px 16px; border-radius: 40px; color: #fff; cursor: pointer;">退出</button>
            </div>
        </div>

        <div id="profile-content">
            <div class="loading">✨ 加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentUser = null;
        let isEditMode = false;
        
        function loadUser() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = JSON.parse(userStr);
            loadProfile();
        }
        
        async function loadProfile() {
            const container = document.getElementById('profile-content');
            
            try {
                const response = await fetch(`${API_BASE}/user/profile/${currentUser.user_id}`);
                if (!response.ok) throw new Error('加载失败');
                
                const profile = await response.json();
                displayProfile(profile);
                loadStories();
                
            } catch (error) {
                container.innerHTML = '<div class="loading">⚠️ 加载失败，请刷新重试</div>';
                console.error(error);
            }
        }
        
        function displayProfile(profile) {
            const container = document.getElementById('profile-content');
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar-section">
                            <div class="avatar-wrapper">
                                <img class="avatar-large" src="${profile.avatar || ''}" 
                                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23667eea\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/%3E%3C/svg%3E'">
                                <div class="avatar-edit-overlay" onclick="alert('头像功能开发中')">
                                    📷
                                </div>
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="name-area">
                                <div id="name-display" class="user-name">${escapeHtml(profile.nickname)}</div>
                                <button class="edit-name-btn" onclick="toggleEditName()">✏️ 编辑</button>
                                <div id="name-edit" style="display: none;">
                                    <input type="text" id="edit-nickname" class="edit-name-input" value="${escapeHtml(profile.nickname)}">
                                    <button onclick="updateNickname()" style="background:#667eea; border:none; padding:6px 16px; border-radius:40px; margin-left:8px; cursor:pointer;">保存</button>
                                    <button onclick="toggleEditName()" style="background:rgba(255,255,255,0.1); border:none; padding:6px 16px; border-radius:40px; margin-left:8px; cursor:pointer;">取消</button>
                                </div>
                                <span class="user-badge">${profile.is_guest ? '🎭 游客' : '⭐ 注册用户'}</span>
                            </div>
                            
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <div class="stat-number">${profile.story_count}</div>
                                    <div class="stat-label">冒险故事</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-number">${profile.favorite_tags.length}</div>
                                    <div class="stat-label">偏好标签</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-number">🏆</div>
                                    <div class="stat-label">成就点数</div>
                                </div>
                            </div>
                            
                            <div class="tags-section">
                                <div class="tags-title">
                                    🏷️ 我的偏好标签
                                </div>
                                <div class="tags-cloud" id="tags-cloud">
                                    ${profile.favorite_tags.length > 0 ? 
                                        profile.favorite_tags.map(tag => `<span class="tag-item">#${escapeHtml(tag)}</span>`).join('') : 
                                        '<span style="color:#666;">暂无偏好，多玩几局游戏吧~</span>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stories-section">
                    <div class="section-header">
                        <div class="section-title">
                            📖 我的冒险故事
                        </div>
                        <a href="history.html" style="color:#667eea; text-decoration:none;">查看全部 →</a>
                    </div>
                    <div id="stories-list" class="story-grid">
                        <div class="loading">加载故事中...</div>
                    </div>
                </div>
            `;
        }
        
        function toggleEditName() {
            const display = document.getElementById('name-display');
            const editArea = document.getElementById('name-edit');
            if (isEditMode) {
                display.style.display = 'block';
                editArea.style.display = 'none';
                isEditMode = false;
            } else {
                display.style.display = 'none';
                editArea.style.display = 'block';
                isEditMode = true;
            }
        }
        
        async function updateNickname() {
            const newNickname = document.getElementById('edit-nickname').value.trim();
            if (!newNickname) return;
            
            try {
                const response = await fetch(`${API_BASE}/user/profile/${currentUser.user_id}?nickname=${encodeURIComponent(newNickname)}`, {
                    method: 'PUT'
                });
                
                if (response.ok) {
                    currentUser.nickname = newNickname;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    loadProfile();
                } else {
                    alert('更新失败');
                }
            } catch (error) {
                alert('更新失败');
            }
        }
        
        async function loadStories() {
            try {
                const response = await fetch(`${API_BASE}/user/${currentUser.user_id}/stories`);
                const data = await response.json();
                displayStories(data.stories);
            } catch (error) {
                document.getElementById('stories-list').innerHTML = '<div class="empty-state">加载故事失败</div>';
            }
        }
        
        function displayStories(stories) {
            const container = document.getElementById('stories-list');
            if (!stories || stories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📖</div>
                        <div>还没有冒险故事</div>
                        <div style="font-size: 13px; margin-top: 8px;">开始你的第一个冒险吧！</div>
                        <a href="index.html" style="display: inline-block; margin-top: 16px; background:#667eea; padding: 8px 24px; border-radius: 40px; text-decoration: none; color: white;">开始冒险</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = stories.map(story => `
                <div class="story-card" onclick="window.location.href='story_detail.html?id=${story.id}'">
                    <div class="story-title">
                        ${escapeHtml(story.title)}
                        <span class="story-badge">${story.status === 'active' ? '进行中' : '已完结'}</span>
                    </div>
                    <div class="story-meta">
                        <span>🌍 ${story.world}</span>
                        <span>📅 ${new Date(story.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="story-summary">${escapeHtml(story.summary)}</div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 退出登录
        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            
            const logoutBtn = document.getElementById('logout-nav-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                });
            }
        });
    </script>
</body>
</html>
