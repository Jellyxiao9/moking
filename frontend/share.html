<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事分享 - 墨境</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .share-container {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(30,30,50,0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .story-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .story-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .story-meta {
            color: #888;
            font-size: 14px;
        }
        .story-summary {
            background: rgba(0,0,0,0.3);
            padding: 24px;
            border-radius: 20px;
            line-height: 1.8;
            margin: 20px 0;
        }
        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(102,126,234,0.1);
            border-radius: 20px;
            margin-top: 20px;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #667eea;
        }
        .view-count {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            padding: 12px;
            background: rgba(102,126,234,0.2);
            border: 1px solid #667eea;
            border-radius: 40px;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="share-container" id="share-content">
            <div style="text-align: center; padding: 40px;">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function loadShare() {
            const path = window.location.pathname;
            const shareId = path.split('/').pop();
            
            if (!shareId) {
                document.getElementById('share-content').innerHTML = '<div class="share-container">分享不存在</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/social/share/${shareId}`);
                if (!response.ok) throw new Error('分享不存在');
                
                const data = await response.json();
                displayShare(data);
                
                // 增加浏览次数
                fetch(`${API_BASE}/social/share/${shareId}/view`, { method: 'POST' });
                
            } catch (error) {
                document.getElementById('share-content').innerHTML = `
                    <div class="share-container">
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 48px;">📖</div>
                            <div style="margin-top: 20px;">分享不存在或已失效</div>
                            <a href="index.html" class="back-btn" style="margin-top: 30px;">返回首页</a>
                        </div>
                    </div>
                `;
            }
        }
        
        function displayShare(data) {
            const container = document.getElementById('share-content');
            container.innerHTML = `
                <div class="story-header">
                    <div class="story-title">${escapeHtml(data.story.title)}</div>
                    <div class="story-meta">🌍 ${data.story.world} · ${new Date(data.story.created_at).toLocaleDateString()}</div>
                </div>
                <div class="story-summary">
                    ${escapeHtml(data.story.summary || '故事很精彩，快来体验吧！')}
                </div>
                <div class="author-info">
                    <img class="author-avatar" src="${data.user.avatar || ''}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23667eea\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/%3E%3C/svg%3E'">
                    <div>
                        <div style="font-weight: 600;">${escapeHtml(data.user.nickname)}</div>
                        <div style="font-size: 12px; color: #888;">分享了一个故事</div>
                    </div>
                </div>
                <div class="view-count">✨ 已有 ${data.view_count} 人看过这个分享</div>
                <a href="index.html" class="back-btn">我也要创作故事 →</a>
            `;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadShare();
    </script>
</body>
</html>
